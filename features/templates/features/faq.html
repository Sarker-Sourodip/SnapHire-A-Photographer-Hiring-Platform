<!DOCTYPE html>
<html>
<head>
    <title>FAQ</title>

    <style>

        body{
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }

        h1{
            text-align: center;
            margin-bottom: 40px;
        }

        .faq-box{
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .question{
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .answer{
            color: #555;
        }

    </style>

</head>

<body>

<h1>Frequently Asked Questions</h1>

{% for faq in faqs %}

<div class="faq-box">

    <div class="question">
        {{ faq.question }}
    </div>

    <div class="answer">
        {{ faq.answer }}
    </div>

</div>

{% endfor %}

</body>
</html>
