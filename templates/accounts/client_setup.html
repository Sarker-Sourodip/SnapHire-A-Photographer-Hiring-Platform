{% extends 'base.html' %}

{% block title %}Edit Client Profile - SnapHire{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom py-3">
                    <h3 class="mb-0 text-primary">Edit My Profile</h3>
                </div>
                
                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        {{ form.as_p }}

                        <hr class="my-4">
                        
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'client_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-success px-5 shadow-sm">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
