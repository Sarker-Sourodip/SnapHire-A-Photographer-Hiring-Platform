{% extends 'base.html' %}

{% block title %}
Photographers
{% endblock %}

{% block content %}
<h1>Photographers Page</h1>
<ul>
	{% for p in photographers %}
		<li>
			<a href="{% url 'photographer_public' p.pk %}">{{ p.user.username }}</a>
			- {{ p.location }}
		</li>
	{% empty %}
		<li>No photographers available.</li>
	{% endfor %}
</ul>
{% endblock %}
